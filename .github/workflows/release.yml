name: Release

# Triggers when you push a tag like v0.3.0, v0.3.1, etc.
# Manual: workflow_dispatch lets us also run it by clicking a button
# in the Actions tab without pushing a tag (useful for testing).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ─── FFmpeg per platform ───────────────────────────────

      - name: Download FFmpeg (Windows, gyan.dev essentials static build)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          New-Item -Path "src-tauri/binaries" -ItemType Directory -Force | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg-extract"
          $ffmpeg = Get-ChildItem -Path "ffmpeg-extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpeg.FullName -Destination "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"
          Remove-Item -Recurse -Force ffmpeg.zip, ffmpeg-extract
          & "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe" -version | Select-Object -First 1

      - name: Download FFmpeg (macOS Apple Silicon, ffmpeg-static)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          # ffmpeg-static publishes platform-specific static builds
          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/darwin-arm64" \
            -o src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          src-tauri/binaries/ffmpeg-aarch64-apple-darwin -version | head -1

      # ─── Build & Release ───────────────────────────────────

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }}'
          releaseBody: |
            Auto-built release. Downloads attached below for Windows and macOS (Apple Silicon).

            **Windows:** download the `.exe` installer. SmartScreen will warn on first launch — click "More info" → "Run anyway" once.

            **macOS (Apple Silicon):** download the `.dmg`. Right-click the app on first launch → "Open" → "Open" (Gatekeeper bypass; one-time per install).

            Full release notes and what's changed: see commit history since the previous release tag.

            See [`KNOWN_LIMITATIONS.md`](https://github.com/sean-rwp/shottrackermaker/blob/master/KNOWN_LIMITATIONS.md) for support details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
